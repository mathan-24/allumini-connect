<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AlumniConnect – Alumni Management System</title>
  <meta name="description" content="Centralized Alumni Data Management & Engagement Platform" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ===================== LOGIN SCREEN ===================== -->
  <div class="login-screen" id="loginScreen">
    <!-- Background blobs -->
    <div class="login-blob login-blob-1"></div>
    <div class="login-blob login-blob-2"></div>
    <div class="login-blob login-blob-3"></div>

    <div class="login-card" id="loginCard">
      <!-- Brand -->
      <div class="login-brand">
        <div class="login-brand-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
            <path d="M12 2L2 7l10 5 10-5-10-5z" stroke="#6C63FF" stroke-width="2" stroke-linejoin="round"/>
            <path d="M2 17l10 5 10-5" stroke="#00D9FF" stroke-width="2" stroke-linejoin="round"/>
            <path d="M2 12l10 5 10-5" stroke="#6C63FF" stroke-width="2" stroke-linejoin="round" opacity="0.6"/>
          </svg>
        </div>
        <div>
          <div class="login-brand-name">AlumniConnect</div>
          <div class="login-brand-sub">Alumni Management System</div>
        </div>
      </div>

      <!-- Auth Tabs -->
      <div class="auth-tabs">
        <button class="auth-tab active" id="tabSignIn">Sign In</button>
        <button class="auth-tab" id="tabSignUp">Sign Up</button>
      </div>

      <!-- Error message -->
      <div class="login-error" id="loginError">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span id="loginErrorText">Invalid username or password</span>
      </div>

      <!-- Sign In Form -->
      <div class="auth-form-container active" id="signInForm">
        <div class="login-form">
          <div class="login-field">
            <label class="login-label">Username</label>
            <div class="login-input-wrap">
              <svg class="login-input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              <input class="login-input" id="loginUsername" type="text" placeholder="Enter username" autocomplete="username" />
            </div>
          </div>

          <div class="login-field">
            <label class="login-label">Password</label>
            <div class="login-input-wrap">
              <svg class="login-input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              <input class="login-input" id="loginPassword" type="password" placeholder="Enter password" autocomplete="current-password" />
              <button class="login-eye" id="loginEye" type="button" tabindex="-1">
                <svg id="eyeIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>

          <button class="login-btn" id="loginBtn">
            <span id="loginBtnText">Sign In</span>
            <svg id="loginBtnIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
          </button>
        </div>

        <!-- Demo Credentials -->
        <div class="login-demo">
          <div class="login-demo-title">Demo Credentials</div>
          <div class="login-demo-grid">
            <div class="login-demo-card" onclick="fillCreds('admin','admin123')">
              <div class="login-demo-role admin-role">Super Admin</div>
              <div class="login-demo-cred"><span>admin</span> / <span>admin123</span></div>
              <div class="login-demo-hint">Full access · CRUD</div>
            </div>
            <div class="login-demo-card" onclick="fillCreds('alumni','alumni123')">
              <div class="login-demo-role alumni-role">Alumni</div>
              <div class="login-demo-cred"><span>alumni</span> / <span>alumni123</span></div>
              <div class="login-demo-hint">My profile CRUD only</div>
            </div>
          </div>
        </div>
      </div>

      <!-- Sign Up Form -->
      <div class="auth-form-container" id="signUpForm">
        <div class="login-form">
          <div class="login-field">
            <label class="login-label">Username</label>
            <div class="login-input-wrap">
              <svg class="login-input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              <input class="login-input" id="regUsername" type="text" placeholder="Choose a username" autocomplete="username" />
            </div>
          </div>

          <div class="login-field">
            <label class="login-label">Full Name</label>
            <div class="login-input-wrap">
              <svg class="login-input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              <input class="login-input" id="regName" type="text" placeholder="e.g. John Doe" />
            </div>
          </div>

          <div class="login-field">
            <label class="login-label">Email Address</label>
            <div class="login-input-wrap">
              <svg class="login-input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
              <input class="login-input" id="regEmail" type="email" placeholder="e.g. john@example.com" />
            </div>
          </div>

          <div class="login-field">
            <label class="login-label">Password</label>
            <div class="login-input-wrap">
              <svg class="login-input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              <input class="login-input" id="regPassword" type="password" placeholder="Create a password" />
              <button class="login-eye" id="regEye" type="button" tabindex="-1">
                <svg id="regEyeIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>

          <button class="login-btn" id="signUpBtn">
            <span id="signUpBtnText">Register Account</span>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
          </button>
        </div>
      </div>

    </div>
  </div>
    </div>
  </div>

  <!-- ===================== MAIN APP ===================== -->
  <div class="app-shell" id="appShell">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <div class="brand-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <path d="M12 2L2 7l10 5 10-5-10-5z" stroke="#6C63FF" stroke-width="2" stroke-linejoin="round"/>
            <path d="M2 17l10 5 10-5" stroke="#00D9FF" stroke-width="2" stroke-linejoin="round"/>
            <path d="M2 12l10 5 10-5" stroke="#6C63FF" stroke-width="2" stroke-linejoin="round" opacity="0.6"/>
          </svg>
        </div>
        <span class="brand-name">AlumniConnect</span>
      </div>

      <nav class="sidebar-nav">
        <a href="#" class="nav-item active" data-page="dashboard" id="nav-dashboard">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
            <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
          </svg>
          <span>Dashboard</span>
        </a>
        <a href="#" class="nav-item" data-page="directory" id="nav-directory">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
          <span>Alumni Directory</span>
        </a>
        <a href="#" class="nav-item" data-page="events" id="nav-events">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/>
            <line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
          <span>Events</span>
        </a>
        <a href="#" class="nav-item" data-page="jobs" id="nav-jobs">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="7" width="20" height="14" rx="2"/>
            <path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/>
            <line x1="12" y1="12" x2="12" y2="16"/><line x1="10" y1="14" x2="14" y2="14"/>
          </svg>
          <span>Job Board</span>
        </a>
        <a href="#" class="nav-item" data-page="analytics" id="nav-analytics">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/>
            <line x1="6" y1="20" x2="6" y2="14"/><line x1="2" y1="20" x2="22" y2="20"/>
          </svg>
          <span>Analytics</span>
        </a>
      </nav>

      <div class="sidebar-footer">
        <div class="admin-pill">
          <div class="admin-avatar" id="sidebarAvatar">A</div>
          <div class="admin-info">
            <span class="admin-name" id="sidebarName">Admin</span>
            <span class="admin-role" id="sidebarRole">Super Admin</span>
          </div>
        </div>
        <button class="logout-btn" id="logoutBtn" title="Sign out">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main" id="main">
      <!-- Top Bar -->
      <header class="topbar">
        <div class="topbar-left">
          <button class="menu-btn" id="menuBtn" aria-label="Toggle sidebar">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/>
            </svg>
          </button>
          <h1 class="page-title" id="pageTitle">Dashboard</h1>
        </div>
        <div class="topbar-right">
          <div class="search-box">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <input type="text" id="globalSearch" placeholder="Search alumni..." />
          </div>
          <!-- Role badge in topbar -->
          <div class="topbar-role-badge" id="topbarRoleBadge"></div>
          <button class="notif-btn" aria-label="Notifications">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
              <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
            </svg>
            <span class="notif-dot"></span>
          </button>
        </div>
      </header>

      <!-- Page Content -->
      <div class="page-content" id="pageContent"></div>
    </main>

  </div><!-- /app-shell -->

  <!-- Modal Overlay -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="modalTitle">Modal</h2>
        <button class="modal-close" id="modalClose" aria-label="Close">&times;</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
